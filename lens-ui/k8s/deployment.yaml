apiVersion: apps/v1
kind: Deployment
metadata:
  name: lens-ui
  namespace: lens
  labels:
    app: lens-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lens-ui
  template:
    metadata:
      labels:
        app: lens-ui
    spec:
      containers:
      - name: lens-ui
        image: lens/lens-ui:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: lens-config
        - secretRef:
            name: lens-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /login
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /login
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lens-ui
  namespace: lens
spec:
  selector:
    app: lens-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
