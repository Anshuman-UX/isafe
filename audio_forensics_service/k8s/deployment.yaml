apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-forensics-service
  namespace: lens
  labels:
    app: audio-forensics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audio-forensics-service
  template:
    metadata:
      labels:
        app: audio-forensics-service
    spec:
      containers:
      - name: audio-forensics-service
        image: lens/audio-forensics-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8003
        envFrom:
        - configMapRef:
            name: lens-config
        - secretRef:
            name: lens-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: audio-forensics-service
  namespace: lens
spec:
  selector:
    app: audio-forensics-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8003
