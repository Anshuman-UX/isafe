# helm/cert-manager/values.yaml
# cert-manager base values for LENS platform

installCRDs: true

global:
  leaderElection:
    namespace: cert-manager
  logLevel: 2

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    namespace: monitoring

podDisruptionBudget:
  enabled: true
  minAvailable: 1
