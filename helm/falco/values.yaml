# helm/falco/values.yaml
# Falco runtime security base values

driver:
  enabled: true
  kind: ebpf            # ebpf preferred; fallback: module

collectors:
  enabled: true
  docker:
    enabled: false
  containerd:
    enabled: true
    socket: /run/containerd/containerd.sock
  crio:
    enabled: false

controller:
  kind: daemonset

falco:
  grpc:
    enabled: true
    unixSocketPath: /run/falco/falco.sock
    threadiness: 8
  grpcOutput:
    enabled: true
  jsonOutput: true
  jsonIncludeOutputProperty: true
  logLevel: info
  priority: debug
  bufferedOutputs: false

customRules:
  lens-rules.yaml: |-
    - rule: LENS Unauthorized Exec in GPU Worker
      desc: Detect exec into GPU worker pods
      condition: >
        spawned_process and container
        and k8s.ns.name = "lens-gpu"
        and proc.name in (bash, sh, zsh, python3)
        and not proc.pname in (tini, dumb-init)
      output: >
        Unauthorized shell in GPU worker
        (user=%user.name pod=%k8s.pod.name ns=%k8s.ns.name cmd=%proc.cmdline)
      priority: WARNING
      tags: [lens, gpu, security]

    - rule: LENS Sensitive File Access
      desc: Detect access to credential files in LENS namespaces
      condition: >
        open_read
        and container
        and k8s.ns.name in (lens-api, lens-gpu, lens-kafka, lens-storage)
        and fd.name in (/etc/shadow, /etc/passwd, /root/.kube/config)
      output: >
        Sensitive file accessed
        (user=%user.name file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: ERROR
      tags: [lens, credentials, security]

    - rule: LENS Unexpected Outbound Connection from Worker
      desc: GPU workers should only connect to Kafka and MinIO
      condition: >
        outbound
        and container
        and k8s.ns.name = "lens-gpu"
        and not fd.sip.name in (lens-kafka-kafka-bootstrap.lens-kafka, minio.lens-storage)
        and not fd.sport in (53, 443)
      output: >
        Unexpected outbound from GPU worker
        (user=%user.name dest=%fd.rip:%fd.rport pod=%k8s.pod.name)
      priority: WARNING
      tags: [lens, network, security]

falcosidekick:
  enabled: true
  replicaCount: 1
  config:
    debug: false
    alertmanager:
      hostport: "http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093"
      minimumpriority: warning
      checkcert: false
    slack:
      webhookurl: ""      # set via secret
      minimumpriority: critical
    loki:
      hostport: "http://loki.monitoring.svc.cluster.local:3100"
      minimumpriority: debug
  webui:
    enabled: true

metrics:
  enabled: true
  interval: 1h
  outputRuleCountersEnabled: true

serviceMonitor:
  enabled: true
  namespace: monitoring
  labels:
    release: kube-prometheus-stack

tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Exists
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists
