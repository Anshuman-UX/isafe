# helm/kube-prometheus-stack/values.yaml
# kube-prometheus-stack base values for LENS platform

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubeSchedulerAlerting: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    prometheus: true

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - matchers:
            - alertname =~ "InfoInhibitor|Watchdog"
          receiver: 'null'
        - matchers:
            - severity = "critical"
          receiver: 'critical'
    receivers:
      - name: 'null'
      - name: 'default'
        webhook_configs:
          - url: 'http://lens-alert-engine.lens-alert.svc.cluster.local:8090/webhook'
      - name: 'critical'
        webhook_configs:
          - url: 'http://lens-alert-engine.lens-alert.svc.cluster.local:8090/webhook/critical'

  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: UTC
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi
  ingress:
    enabled: false   # exposed via Istio VirtualService

prometheus:
  prometheusSpec:
    replicas: 1
    retention: 15d
    walCompression: true
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
