apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-service
  namespace: lens
  labels:
    app: fusion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fusion-service
  template:
    metadata:
      labels:
        app: fusion-service
    spec:
      containers:
      - name: fusion-service
        image: lens/fusion-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: lens-config
        - secretRef:
            name: lens-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fusion-service
  namespace: lens
spec:
  selector:
    app: fusion-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
