# ArgoCD Application manifests for all 6 LENS services — PRODUCTION
# automated sync is DISABLED — requires manual ArgoCD sync for production
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lens-image-prod
  namespace: argocd
spec:
  project: lens-prod
  source:
    repoURL: https://github.com/YOUR_ORG/lens
    targetRevision: HEAD
    path: image_forensics_service/k8s
    helm:
      valueFiles:
        - devops/argocd/production/image_forensics_service-values.yaml
  destination:
    server: https://PROD_K8S_API_SERVER
    namespace: lens
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    # NO automated block — prod requires explicit argocd app sync
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
