# Helm values for OpenTelemetry Collector
# Deploy: helm upgrade --install lens-otel open-telemetry/opentelemetry-collector \
#           -f devops/otel/otel-collector-values.yaml -n monitoring

mode: deployment

replicaCount: 2

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.96.0"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector-self
            static_configs:
              - targets: ["localhost:8888"]

  processors:
    batch:
      send_batch_size: 512
      timeout: 5s
    memory_limiter:
      check_interval: 1s
      limit_mib: 900
      spike_limit_mib: 200
    resourcedetection:
      detectors: [k8snode, k8s]
      timeout: 5s
    # Propagate W3C trace context from Kafka message headers
    transform:
      trace_statements:
        - context: span
          statements:
            - set(attributes["lens.case_id"], attributes["kafka.header.case_id"])
            - set(attributes["lens.media_type"], attributes["kafka.header.media_type"])

  exporters:
    otlp/tempo:
      endpoint: "http://tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true
    prometheus:
      endpoint: "0.0.0.0:8889"
      namespace: lens_otel
    debug:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resourcedetection, transform, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

ports:
  otlp-grpc:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
