# .github/workflows/ci.yaml
name: LENS Forensic CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  test_suite:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libsndfile1 libgl1

    - name: Install Pytest & Packages
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov numpy scipy opencv-python scikit-learn

    - name: Execute Pytest Unit & Integration Tests
      run: |
        pytest tests/test_unit.py tests/test_integration.py --cov=. --cov-report=xml
