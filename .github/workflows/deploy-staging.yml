name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/lens

jobs:
  build-and-push:
    name: Build + Push + SBOM (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - image_forensics_service
          - video_forensics_service
          - audio_forensics_service
          - av_sync_service
          - fusion_service
          - api_service
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          artifact-name: sbom-${{ matrix.service }}-${{ github.sha }}.spdx
          output-file: sbom-${{ matrix.service }}.spdx

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx

  argocd-sync-staging:
    name: ArgoCD Sync → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Update image tags in Helm values
        run: |
          for svc in image_forensics_service video_forensics_service audio_forensics_service av_sync_service fusion_service api_service; do
            sed -i "s|tag:.*|tag: ${{ github.sha }}|g" devops/argocd/staging/${svc}-values.yaml || true
          done

      - name: Commit updated tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update staging image tags to ${{ github.sha }}"
          branch: main

      - name: ArgoCD login
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --grpc-web --insecure

      - name: Sync all staging apps
        run: |
          for app in lens-image-staging lens-video-staging lens-audio-staging \
                     lens-av-sync-staging lens-fusion-staging lens-api-staging; do
            argocd app sync $app --prune --timeout 300
            argocd app wait $app --health --timeout 300
          done

  smoke-tests:
    name: Staging Smoke Tests
    runs-on: ubuntu-latest
    needs: argocd-sync-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pytest
      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          STAGING_TOKEN:   ${{ secrets.STAGING_SMOKE_TOKEN }}
        run: pytest tests/smoke_tests.py -v
