name: LENS PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black
      - run: ruff check .
      - run: black --check .

  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1 libgl1
      - name: Install Python deps
        run: pip install pytest pytest-cov numpy scipy opencv-python scikit-learn
      - name: Run unit tests
        run: pytest tests/test_unit.py --cov=. --cov-report=xml --cov-fail-under=90
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pytest numpy scikit-learn
      - run: pytest tests/test_integration.py -v

  docker-build-scan:
    name: Docker Build + Trivy CVE Scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    strategy:
      matrix:
        service:
          - image_forensics_service
          - video_forensics_service
          - audio_forensics_service
          - av_sync_service
          - fusion_service
          - api_service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: lens/${{ matrix.service }}:pr-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy CVE Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lens/${{ matrix.service }}:pr-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
